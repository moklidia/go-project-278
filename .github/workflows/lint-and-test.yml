name: lint-and-test

on:
  push:
    branches:
      - '**'
    tags:
      - '**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: link_shortener_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d link_shortener_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.4'
          cache: true
          cache-dependency-path: go.sum
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Test
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/link_shortener_test?sslmode=disable
          APP_URL: https://short.io
        run: make test
